<svg
  xmlns="http://www.w3.org/2000/svg"
  width="640"
  height="1140"
  viewBox="0 0 640 1140"
  fill="none"
>
  <rect width="640" height="1140" fill="#F7F7F8" />
  <defs>
    <marker
      id="arrow"
      viewBox="0 0 10 10"
      refX="9"
      refY="5"
      markerWidth="7"
      markerHeight="7"
      orient="auto-start-reverse"
    >
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8A8D95" />
    </marker>
  </defs>
  <g
    fill="#FBFBFC"
    stroke="#A5A8AF"
    stroke-width="1.6"
    font-family="Inter, sans-serif"
    font-size="14"
    font-weight="500"
    text-anchor="middle"
    dominant-baseline="middle"
  >
    <rect x="150" y="16" width="216" height="46" />
    <text x="258" y="39" fill="#000000">Record slippage &amp; errors</text>

    <line
      x1="258"
      y1="62"
      x2="258"
      y2="105"
      stroke="#8A8D95"
      marker-end="url(#arrow)"
    />

    <polygon points="258,108 365,212 258,316 151,212" />
    <text x="258" y="212" fill="#000000">Roll misaligned or splice?</text>

    <text x="332" y="356" fill="#000000">Yes</text>
    <path
      d="M 296 280 C 324 312, 332 334, 332 380"
      stroke="#8A8D95"
      marker-end="url(#arrow)"
    />
    <rect x="225" y="382" width="213" height="48" />
    <text x="331.5" y="406" fill="#000000">Re-center roll / fix splice</text>

    <text x="185" y="410" fill="#000000">No</text>
    <path
      d="M 202 280 C 178 324, 178 396, 226 472"
      stroke="#8A8D95"
      marker-end="url(#arrow)"
    />
    <path
      d="M 332 430 C 332 456, 314 472, 286 472"
      stroke="#8A8D95"
      marker-end="url(#arrow)"
    />

    <rect x="146" y="473" width="224" height="48" />
    <text x="258" y="497" fill="#000000">Clean belts, sensors, tube</text>

    <line
      x1="258"
      y1="521"
      x2="258"
      y2="562"
      stroke="#8A8D95"
      marker-end="url(#arrow)"
    />

    <rect x="165" y="564" width="186" height="48" />
    <text x="258" y="588" fill="#000000">Adjust tension &amp; test</text>

    <path
      d="M 228 612 C 198 628, 188 648, 188 652"
      stroke="#8A8D95"
      marker-end="url(#arrow)"
    />
    <path
      d="M 352 612 C 425 626, 432 678, 432 812 C 432 906, 415 1051, 371 1080"
      stroke="#8A8D95"
      marker-end="url(#arrow)"
    />

    <polygon points="200,654 309,760 200,866 91,760" />
    <text x="200" y="760" fill="#000000">Slippage resolved?</text>

    <text x="103" y="876" fill="#000000">Yes</text>
    <path
      d="M 150 825 C 110 866, 102 890, 102 930"
      stroke="#8A8D95"
      marker-end="url(#arrow)"
    />
    <rect x="12" y="930" width="181" height="46" />
    <text x="102.5" y="953" fill="#000000">Resume production</text>

    <text x="296" y="876" fill="#000000">No</text>
    <path
      d="M 250 825 C 284 856, 298 878, 298 892"
      stroke="#8A8D95"
      marker-end="url(#arrow)"
    />
    <polygon points="299,894 361,954 299,1014 237,954" />
    <text x="299" y="954" fill="#000000">Belts worn?</text>

    <text x="299" y="1050" fill="#000000">Yes</text>
    <path
      d="M 299 1014 L 299 1078"
      stroke="#8A8D95"
      marker-end="url(#arrow)"
    />
    <rect x="253" y="1079" width="142" height="46" />
    <text x="324" y="1102" fill="#000000">Replace belts</text>

    <text x="534" y="1050" fill="#000000">No</text>
    <path
      d="M 361 970 C 452 1004, 534 1028, 534 1078"
      stroke="#8A8D95"
      marker-end="url(#arrow)"
    />
    <rect x="469" y="1079" width="129" height="46" />
    <text x="533.5" y="1102" fill="#000000">Call service</text>
  </g>
</svg>
